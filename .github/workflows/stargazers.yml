name: Update Stargazers Data

on:
  watch:
    types: [started]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: data

      - name: Fetch API Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all stargazers
          gh api --paginate "repos/${{ github.repository }}/stargazers" > stargazers.json
          
          # Fetch total repo info (sauvegardé à la racine)
          gh api "repos/${{ github.repository }}" > repo.json

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ajout des fichiers à la racine
          git add stargazers.json repo.json
          
          git commit -m "chore: update stargazers data" || echo "No changes to commit"
          git push origin HEAD:data
