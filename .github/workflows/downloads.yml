name: Update KDE Store Downloads Badge and History

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:    # Allows manual trigger

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: data

      - name: Fetch downloads, generate JSON and update History
        run: |
          # Fetch total downloads from KDE Store
          TOTAL=$(curl -s 'https://store.kde.org/p/2356087/loadFiles' | jq '[.files[].downloaded_count_uk // 0] | add')

          # 1. Generate the JSON file for Shields.io at the root (overwrites each time)
          echo "{\"schemaVersion\": 1, \"label\": \"Downloads\", \"message\": \"$TOTAL\", \"color\": \"blue\"}" > downloads-badge.json

          # 2. Accumulate data for the curve (CSV format: timestamp, total)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ") # Standard UTC timestamp

          # Add header if the CSV file doesn't exist yet at the root
          if [ ! -f downloads-history.csv ]; then
            echo "timestamp,downloads" > downloads-history.csv
          fi

          # Append the new data to the CSV
          echo "$TIMESTAMP,$TOTAL" >> downloads-history.csv

      - name: Commit and push changes
        run: |
          # Setup Git bot user
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage both the badge file and the history file from the root
          git add downloads-badge.json
          git add downloads-history.csv

          # Commit only if files have changed, then push to 'data'
          git commit -m "chore: update downloads badge and history" || exit 0
          git push origin HEAD:data # <--- On renvoie le résultat uniquement sur data
