name: Mettre à jour le compteur KDE Store

on:
  schedule:
    - cron: '0 * * * *' # S'exécute toutes les heures
  workflow_dispatch: # Te permet aussi de le lancer manuellement via l'interface GitHub

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Calculer les téléchargements et générer le JSON
        run: |
          # Ta commande curl + jq
          TOTAL=$(curl -s 'https://store.kde.org/p/2356087/loadFiles' | jq '[.files[].downloaded_count_uk // 0] | add')
          
          # Création du fichier au format attendu par Shields.io
          echo "{\"schemaVersion\": 1, \"label\": \"Téléchargements\", \"message\": \"$TOTAL\", \"color\": \"blue\"}" > downloads-badge.json

      - name: Commit et Push des changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads-badge.json
          # Ne fait un commit que si le nombre a changé
          git commit -m "Mise à jour automatique du compteur de téléchargements" || exit 0
          git push
